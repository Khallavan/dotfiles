set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -ga terminal-overrides ",*256col*:Tc"

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -g detach-on-destroy off
set -g focus-events on

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 80
set -g display-time 2000

setw -g mode-keys vi
bind r source-file ~/.tmux.conf \; display-message "tmux recargado"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

set -g status-style "bg=#282828,fg=#ebdbb2"
set -g message-style "bg=#3c3836,fg=#ebdbb2"
set -g message-command-style "bg=#3c3836,fg=#fabd2f"

set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#fabd2f"

set -g window-status-style "bg=#282828,fg=#a89984"
set -g window-status-current-style "bg=#458588,fg=#fbf1c7,bold"
set -g window-status-activity-style "bg=#282828,fg=#fabd2f"
set -g window-status-bell-style "bg=#cc241d,fg=#fbf1c7,bold"

set -g status-left "#[fg=#282828,bg=#b8bb26,bold] #S #[fg=#b8bb26,bg=#282828]│"
set -g status-right "#[fg=#a89984,bg=#282828] %Y-%m-%d │ %H:%M "
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=#fbf1c7,bg=#458588,bold] #I:#W "

set-option -g set-titles on
set-option -g set-titles-string "#S:#I:#W"

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set -g status-interval 5
